<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DK64 Loading Zone Graph</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- vis-network -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    html, body {
      height: 100%;
      background-color: #121212;
      color: #eaeaea;
    }
    #graph {
      height: calc(100vh - 70px);
      border: 1px solid #333;
      border-radius: 0.5rem;
      background-color: #0d0d0d;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand mb-0 h1">DK64 Loading Zone Graph</span>
  <input class="form-control form-control-sm w-auto" type="file" id="fileInput" accept="application/json">
  <span class="ms-3 text-muted" id="status"></span>
</nav>

<div class="container-fluid mt-3">
  <div id="graph"></div>
</div>

<script>
  const container = document.getElementById('graph');
  const statusEl = document.getElementById('status');

  const options = {
    layout: { improvedLayout: true },
    physics: {
      enabled: true,
      stabilization: false,
      barnesHut: { gravitationalConstant: -25000 }
    },
    nodes: {
      shape: 'dot',
      size: 12,
      font: { color: '#ffffff', size: 12 },
      color: {
        background: '#0d6efd',
        border: '#084298'
      }
    },
    edges: {
      arrows: { to: { enabled: true, scaleFactor: 0.6 } },
      color: { color: '#bbbbbb' },
      smooth: { type: 'dynamic' }
    }
  };

  let network;

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const text = await file.text();
    const json = JSON.parse(text);

    /*
      DK64 Randomizer loading zone shuffle is stored in:
      json["Shuffled Exits"]

      Format:
      {
        "From Zone": "To Zone",
        ...
      }
    */
    const exits = json["Shuffled Exits"];

    if (!exits) {
      statusEl.textContent = '"Shuffled Exits" not found in spoiler log';
      return;
    }

    const nodes = new vis.DataSet();
    const edges = new vis.DataSet();
    const seen = new Set();

    Object.entries(exits).forEach(([from, to]) => {
        let from_map = from;
        if (from.includes(" to ")) {
            from_map = from.split(" to ")[0];
            if (from_map.includes("Main")) {
                from_map = from_map.split(" ").filter((k, i) => i < 2).join(" ");
            } else if (from_map.includes("DK Isles") && from_map !== "DK Isles") {
                from_map = from_map.split("DK Isles")[1].trim()
            }
        } else if (from.includes(" from ")) {
            from_map = from.split(" from ")[1];
            if (from_map.includes("Main")) {
                from_map = from_map.split(" ").filter((k, i) => i < 2).join(" ");
            } else if (from_map.includes("DK Isles") && from_map !== "DK Isles") {
                from_map = from_map.split("DK Isles")[1].trim()
            }
        }
        if (!seen.has(from_map)) {
            nodes.add({ id: from_map, label: from_map });
            seen.add(from_map);
        }
        let to_map = to;
        if (to.includes( "from ")) {
            to_map = from.split(" from ")[0];
            if (to_map.includes("Main")) {
                to_map = to_map.split(" ").filter((k, i) => i < 2).join(" ");
            } else if (to_map.includes("DK Isles") && to_map !== "DK Isles") {
                to_map = to_map.split("DK Isles")[1].trim()
            }
        } else if (to.includes(" to ")) {
            to_map = to.split(" to ")[1];
            if (to_map.includes("Main")) {
                to_map = to_map.split(" ").filter((k, i) => i < 2).join(" ");
            } else if (to_map.includes("DK Isles") && to_map !== "DK Isles") {
                to_map = to_map.split("DK Isles")[1].trim()
            }
        }
        if (!seen.has(to_map)) {
            nodes.add({ id: to_map, label: to_map });
            seen.add(to_map);
        }
        edges.add({ from: from_map, to: to_map, label: from });
    });

    network = new vis.Network(container, { nodes, edges }, options);
    statusEl.textContent = `Loaded ${edges.length} shuffled exits`;
  });
</script>

</body>
</html>
