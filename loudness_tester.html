<!DOCTYPE html>
<html lang="en-US" data-bs-theme="dark">
  <head>
    <title>Loudness Tester</title>
    <!-- Discord -->
    <meta content="Loudness Tester" property="og:title" />
    <meta content="A quick web app to determine the loudness of an audio file." property="og:description" />
    <meta content="DK64 Utils" property="og:site_name" />
    <meta content="https://raw.githubusercontent.com/theballaam96/theballaam96.github.io/master/assets/head.png" property="og:image" />
    <script src="script/loudness.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body style="background-color:#333">
    <div hidden>
      <canvas id="meter" width="120" height="400" style="visibility: hidden;"></canvas>
      <div class="readout-group" style="visibility: hidden;">
        <button id="label-average">
          <span>INT</span>
        </button>
        <button id="average" onclick="ResetAverage()">
          <span>-</span>
        </button>
        <button id="label-hold-max">
          <span>MAX</span>
        </button>
        <button id="hold-max" onclick="ResetHoldMax()">
          <span>-</span>
        </button>
        <button id="reset" onclick="ResetAll()">
          <i class="reset-icon material-icons" style="font-size: 40px;">cancel</i>
        </button>
      </div>
      <button id="beta_mic" disabled style="visibility: hidden;">
        <span>BETA</span>
      </button>
      <div class="settings-group" style="visibility: hidden;">
        <h1>Scale</h1>
        <label class="control control--radio">Positive <input type="radio" name="scale" checked="checked" onclick="useSPLScale(val=true)" />
          <div class="control__indicator"></div>
        </label>
        <label class="control control--radio">Negative <input type="radio" name="scale" onclick="useSPLScale(val=false)" />
          <div class="control__indicator"></div>
        </label>
        <hr />
        <h1>Standard</h1>
        <label class="control control--radio" onclick="setStandard(value='volume')">Volume <input type="radio" name="standard" />
          <div class="control__indicator"></div>
        </label>
        <label class="control control--radio" onclick="setStandard(value='momentary')">Momentary <input type="radio" name="standard" checked="checked" />
          <div class="control__indicator"></div>
        </label>
        <label class="control control--radio" onclick="setStandard(value='short')">Short-Term <input type="radio" name="standard" />
          <div class="control__indicator"></div>
        </label>
      </div>
      <button id="settings_button" onclick="settingsPanel()" style="visibility: hidden;">
        <i class="settings-icon material-icons" style="font-size: 48px;">settings</i>
      </button>
      <button id="readout" disabled style="visibility: hidden;">
        <span>-</span>
      </button>
    </div>
    <!-- Actual stuff -->
    <div class="position-absolute top-50 start-50 translate-middle">
        <div class="card text-center p-5" style="min-width: 500px">
            <h1>Loudness Tester</h1>
            <div class="text-center p-3 use-files">
                <button id="audio-from-file" class="btn btn-primary w-100" onclick="clickLoadButton()">
                    <div id="loading-spinner" hidden>
                        <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                        <span role="status">Loading...</span>
                    </div>
                    <div id="default-loader">
                        Load file
                    </div>
                </button>
            </div>
            <textarea id="text-info" disabled style="visibility: hidden;" hidden></textarea>
            <label class="fileContainer" style="visibility: hidden;" hidden> Select files (stereo only) <input id="the-file-input" type="file" name="file[]" multiple onchange="handleFiles(this.files)" />
            </label>
            <div id="results_table" hidden>
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Attribute</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>File</td>
                            <td id="results-file"></td>
                        </tr>
                        <tr>
                            <td>Momentary Max</td>
                            <td id="results-mommax"></td>
                        </tr>
                        <tr>
                            <td>Short-Term Max</td>
                            <td id="results-stmax"></td>
                        </tr>
                        <tr>
                            <td>Integrated Max</td>
                            <td id="results-integrated"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-4 fst-italic">
                Based off the work of <a href="https://youlean.co/file-loudness-meter/">Youlean</a>, motivated by <a href="https://en.wikipedia.org/wiki/Enshittification">Youlean's concerning March 2026 update</a>.
            </div>
        </div>
    </div>
    <script>
        function clickLoadButton() {
            audioFromFile();
            document.getElementById("the-file-input").click();
        }
    </script>
  </body>
</html>
